name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  collect-binaries:
    name: Collect native binaries
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Wait for the build-native workflow to finish for this tag
      - name: Wait for native build workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-name: "Build linux-x64"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

      - name: Download linux-x64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: navyfox/_libs/linux-x64/

      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: navyfox/_libs/linux-arm64/

      - name: Download win-x64
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: navyfox/_libs/win-x64/

      - name: Download win-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-win-arm64
          path: navyfox/_libs/win-arm64/

      - name: Download osx-arm64
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: navyfox/_libs/osx-arm64/

      - name: Download osx-x64
        uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: navyfox/_libs/osx-x64/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Build sdist
        run: python -m build --sdist --no-isolation

      - name: Publish to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          TWINE_USERNAME: __token__
        run: twine upload dist/*
